<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#c0392b"/></marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#1a6faf"/></marker>
    <marker id="arr-o" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#e67e22"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000025"/></filter>
  </defs>

  <rect width="960" height="620" fill="#f5f7fa"/>
  <rect x="0" y="0" width="960" height="48" fill="#1a252f"/>
  <text x="480" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">⑦ S3 Cross-Account Permission Model</text>

  <!-- Legend -->
  <rect x="30" y="56" width="900" height="28" rx="6" fill="#2c3e50"/>
  <line x1="50" y1="70" x2="80" y2="70" stroke="#27ae60" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="88" y="74" font-size="10" fill="#27ae60">Cross-Account Read (s3:GetObject)</text>
  <line x1="280" y1="70" x2="310" y2="70" stroke="#e67e22" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="318" y="74" font-size="10" fill="#e67e22">Cross-Account Write (s3:PutObject)</text>
  <line x1="510" y1="70" x2="540" y2="70" stroke="#1a6faf" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="548" y="74" font-size="10" fill="#1a6faf">Same-Account Lambda R/W</text>
  <line x1="700" y1="70" x2="730" y2="70" stroke="#c0392b" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arr-r)"/>
  <text x="738" y="74" font-size="10" fill="#c0392b">Access Denied</text>

  <!-- ── Core S3 Buckets ── -->
  <rect x="30" y="96" width="220" height="200" rx="12" fill="#d5e8f7" stroke="#1a6faf" stroke-width="2" filter="url(#sh)"/>
  <text x="140" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a6faf">Core Account (111)</text>

  <rect x="46" y="124" width="188" height="72" rx="8" fill="#1a6faf"/>
  <text x="140" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🪣 core-shared</text>
  <text x="140" y="157" text-anchor="middle" font-size="9" fill="#cce5ff">111111111111-ap-northeast-1</text>
  <text x="140" y="170" text-anchor="middle" font-size="9" fill="#cce5ff">-core-shared</text>
  <text x="140" y="185" text-anchor="middle" font-size="9" fill="#aad4f5">Bucket Policy: R/W → 222,333,444</text>

  <rect x="46" y="206" width="188" height="72" rx="8" fill="#1557a0"/>
  <text x="140" y="224" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🪣 cloudtrail</text>
  <text x="140" y="239" text-anchor="middle" font-size="9" fill="#cce5ff">111111111111-ap-northeast-1</text>
  <text x="140" y="252" text-anchor="middle" font-size="9" fill="#cce5ff">-cloudtrail</text>
  <text x="140" y="267" text-anchor="middle" font-size="9" fill="#aad4f5">Principal: cloudtrail.amazonaws.com</text>

  <!-- Core Lambda -->
  <rect x="46" y="286" width="188" height="36" rx="8" fill="#e67e22"/>
  <text x="140" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Lambda: core-management-fn</text>
  <text x="140" y="314" text-anchor="middle" font-size="9" fill="#fde8c8">grantReadWrite(bucket)</text>

  <!-- ── Dev S3 ── -->
  <rect x="290" y="96" width="200" height="130" rx="12" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#sh)"/>
  <text x="390" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#27ae60">Dev Account (222)</text>
  <rect x="306" y="124" width="168" height="72" rx="8" fill="#27ae60"/>
  <text x="390" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🪣 dev-app</text>
  <text x="390" y="157" text-anchor="middle" font-size="9" fill="#d5f5e3">222222222222-ap-northeast-1</text>
  <text x="390" y="170" text-anchor="middle" font-size="9" fill="#d5f5e3">-dev-app</text>
  <text x="390" y="185" text-anchor="middle" font-size="9" fill="#a9dfbf">Bucket Policy: Read → 111</text>
  <rect x="306" y="206" width="168" height="36" rx="8" fill="#1e8449"/>
  <text x="390" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Lambda: dev-app-fn</text>
  <text x="390" y="234" text-anchor="middle" font-size="9" fill="#a9dfbf">grantReadWrite(bucket)</text>

  <!-- ── Staging S3 ── -->
  <rect x="530" y="96" width="200" height="130" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#sh)"/>
  <text x="630" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#f39c12">Staging Account (333)</text>
  <rect x="546" y="124" width="168" height="72" rx="8" fill="#f39c12"/>
  <text x="630" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🪣 staging-app</text>
  <text x="630" y="157" text-anchor="middle" font-size="9" fill="#fef9e7">333333333333-ap-northeast-1</text>
  <text x="630" y="170" text-anchor="middle" font-size="9" fill="#fef9e7">-staging-app</text>
  <text x="630" y="185" text-anchor="middle" font-size="9" fill="#fde8c8">Bucket Policy: Read → 111, 444</text>
  <rect x="546" y="206" width="168" height="36" rx="8" fill="#d68910"/>
  <text x="630" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Lambda: staging-app-fn</text>
  <text x="630" y="234" text-anchor="middle" font-size="9" fill="#fef9e7">grantReadWrite(bucket)</text>

  <!-- ── Prod S3 ── -->
  <rect x="770" y="96" width="160" height="130" rx="12" fill="#fde8e8" stroke="#c0392b" stroke-width="2" filter="url(#sh)"/>
  <text x="850" y="116" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Prod Account (444)</text>
  <rect x="786" y="124" width="128" height="72" rx="8" fill="#c0392b"/>
  <text x="850" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🪣 prod-app</text>
  <text x="850" y="157" text-anchor="middle" font-size="9" fill="#fde8e8">444444444444-ap-northeast-1</text>
  <text x="850" y="170" text-anchor="middle" font-size="9" fill="#fde8e8">-prod-app</text>
  <text x="850" y="185" text-anchor="middle" font-size="9" fill="#f1948a">Bucket Policy: Read → 111 ONLY</text>
  <rect x="786" y="206" width="128" height="36" rx="8" fill="#922b21"/>
  <text x="850" y="220" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Lambda: prod-app-fn</text>
  <text x="850" y="234" text-anchor="middle" font-size="9" fill="#f1948a">grantReadWrite(bucket)</text>

  <!-- ── Access matrix ── -->
  <rect x="30" y="250" width="460" height="200" rx="10" fill="white" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
  <rect x="30" y="250" width="460" height="28" rx="10" fill="#2c3e50"/>
  <text x="260" y="269" text-anchor="middle" font-size="12" font-weight="bold" fill="white">S3 Access Permission Matrix  (✓=Allow  ✗=Deny)</text>

  <rect x="30" y="278" width="115" height="24" fill="#ecf0f1"/><text x="87" y="294" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Accessor ↓  Bucket →</text>
  <rect x="145" y="278" width="86" height="24" fill="#d5e8f7"/><text x="188" y="294" text-anchor="middle" font-size="10" fill="#1a6faf">core-shared</text>
  <rect x="231" y="278" width="86" height="24" fill="#d5f5e3"/><text x="274" y="294" text-anchor="middle" font-size="10" fill="#27ae60">dev-app</text>
  <rect x="317" y="278" width="86" height="24" fill="#fef9e7"/><text x="360" y="294" text-anchor="middle" font-size="10" fill="#f39c12">staging-app</text>
  <rect x="403" y="278" width="87" height="24" fill="#fde8e8"/><text x="446" y="294" text-anchor="middle" font-size="10" fill="#c0392b">prod-app</text>

  <!-- Row Core Lambda -->
  <rect x="30" y="302" width="115" height="28" fill="#d5e8f7"/><text x="87" y="320" text-anchor="middle" font-size="9" fill="#1a6faf">Core Lambda (111)</text>
  <rect x="145" y="302" width="86" height="28" fill="#e8f8f5"/><text x="188" y="320" text-anchor="middle" font-size="12" fill="#27ae60">✓ R/W</text>
  <rect x="231" y="302" width="86" height="28" fill="#fef9e7"/><text x="274" y="320" text-anchor="middle" font-size="12" fill="#f39c12">✓ R</text>
  <rect x="317" y="302" width="86" height="28" fill="#fef9e7"/><text x="360" y="320" text-anchor="middle" font-size="12" fill="#f39c12">✓ R</text>
  <rect x="403" y="302" width="87" height="28" fill="#fef9e7"/><text x="446" y="320" text-anchor="middle" font-size="12" fill="#f39c12">✓ R</text>

  <!-- Row Dev Lambda -->
  <rect x="30" y="330" width="115" height="28" fill="#d5f5e3"/><text x="87" y="348" text-anchor="middle" font-size="9" fill="#27ae60">Dev Lambda (222)</text>
  <rect x="145" y="330" width="86" height="28" fill="#e8f8f5"/><text x="188" y="348" text-anchor="middle" font-size="11" fill="#27ae60">✓ via Role</text>
  <rect x="231" y="330" width="86" height="28" fill="#e8f8f5"/><text x="274" y="348" text-anchor="middle" font-size="12" fill="#27ae60">✓ R/W</text>
  <rect x="317" y="330" width="86" height="28" fill="#fde8e8"/><text x="360" y="348" text-anchor="middle" font-size="12" fill="#c0392b">✗</text>
  <rect x="403" y="330" width="87" height="28" fill="#fde8e8"/><text x="446" y="348" text-anchor="middle" font-size="12" fill="#c0392b">✗</text>

  <!-- Row Staging Lambda -->
  <rect x="30" y="358" width="115" height="28" fill="#fef9e7"/><text x="87" y="376" text-anchor="middle" font-size="9" fill="#f39c12">Staging Lambda (333)</text>
  <rect x="145" y="358" width="86" height="28" fill="#e8f8f5"/><text x="188" y="376" text-anchor="middle" font-size="11" fill="#27ae60">✓ via Role</text>
  <rect x="231" y="358" width="86" height="28" fill="#fde8e8"/><text x="274" y="376" text-anchor="middle" font-size="12" fill="#c0392b">✗</text>
  <rect x="317" y="358" width="86" height="28" fill="#e8f8f5"/><text x="360" y="376" text-anchor="middle" font-size="12" fill="#27ae60">✓ R/W</text>
  <rect x="403" y="358" width="87" height="28" fill="#fde8e8"/><text x="446" y="376" text-anchor="middle" font-size="12" fill="#c0392b">✗</text>

  <!-- Row Prod Lambda -->
  <rect x="30" y="386" width="115" height="28" fill="#fde8e8"/><text x="87" y="404" text-anchor="middle" font-size="9" fill="#c0392b">Prod Lambda (444)</text>
  <rect x="145" y="386" width="86" height="28" fill="#e8f8f5"/><text x="188" y="404" text-anchor="middle" font-size="11" fill="#27ae60">✓ via Role</text>
  <rect x="231" y="386" width="86" height="28" fill="#fde8e8"/><text x="274" y="404" text-anchor="middle" font-size="12" fill="#c0392b">✗</text>
  <rect x="317" y="386" width="86" height="28" fill="#fde8e8"/><text x="360" y="404" text-anchor="middle" font-size="12" fill="#c0392b">✗</text>
  <rect x="403" y="386" width="87" height="28" fill="#e8f8f5"/><text x="446" y="404" text-anchor="middle" font-size="12" fill="#27ae60">✓ R/W</text>

  <!-- Row note -->
  <rect x="30" y="414" width="460" height="36" rx="0" fill="#fff3cd"/>
  <text x="260" y="430" text-anchor="middle" font-size="9" fill="#856404">💡 "via Role" = Lambda first calls sts:AssumeRole to get temp credentials, then accesses the target Bucket</text>
  <text x="260" y="444" text-anchor="middle" font-size="9" fill="#856404">Prod Bucket is strictest: only Core account can read. Dev/Staging have no access.</text>

  <!-- S3 security features -->
  <rect x="510" y="250" width="420" height="200" rx="10" fill="white" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
  <rect x="510" y="250" width="420" height="28" rx="10" fill="#2c3e50"/>
  <text x="720" y="269" text-anchor="middle" font-size="12" font-weight="bold" fill="white">All S3 Bucket Security Settings</text>

  <rect x="526" y="286" width="188" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="620" y="304" text-anchor="middle" font-size="10" fill="#27ae60">✓ Server-Side Encryption (SSE-S3)</text>
  <rect x="724" y="286" width="188" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="818" y="304" text-anchor="middle" font-size="10" fill="#27ae60">✓ Block Public Access</text>
  <rect x="526" y="322" width="188" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="620" y="340" text-anchor="middle" font-size="10" fill="#27ae60">✓ Enforce SSL (HTTPS only)</text>
  <rect x="724" y="322" width="188" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="818" y="340" text-anchor="middle" font-size="10" fill="#27ae60">✓ Versioning Enabled</text>
  <rect x="526" y="358" width="188" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="620" y="376" text-anchor="middle" font-size="10" fill="#27ae60">✓ Lifecycle: 90-day old version expiry</text>
  <rect x="724" y="358" width="188" height="28" rx="6" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="818" y="376" text-anchor="middle" font-size="10" fill="#27ae60">✓ RemovalPolicy: RETAIN</text>
  <rect x="526" y="394" width="386" height="28" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="1"/>
  <text x="719" y="412" text-anchor="middle" font-size="10" fill="#c0392b">✗ HTTP denied — aws:SecureTransport enforces HTTPS</text>
  <rect x="526" y="430" width="386" height="20" rx="4" fill="#fff3cd"/>
  <text x="719" y="444" text-anchor="middle" font-size="9" fill="#856404">Incomplete Multipart Upload cleanup: 7 days</text>

  <!-- Cross-account flow diagram -->
  <rect x="30" y="468" width="900" height="120" rx="10" fill="white" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
  <rect x="30" y="468" width="900" height="28" rx="10" fill="#1a6faf"/>
  <text x="480" y="487" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Full Cross-Account S3 Access Flow (Dev Lambda → Core S3)</text>

  <rect x="50" y="504" width="120" height="68" rx="8" fill="#27ae60"/>
  <text x="110" y="524" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Dev Lambda</text>
  <text x="110" y="538" text-anchor="middle" font-size="9" fill="#d5f5e3">dev-app-fn</text>
  <text x="110" y="552" text-anchor="middle" font-size="9" fill="#d5f5e3">Account: 222</text>

  <path d="M 170 538 L 230 538" stroke="#8e44ad" stroke-width="2" fill="none" marker-end="url(#arr-b)"/>
  <text x="200" y="530" text-anchor="middle" font-size="8" fill="#8e44ad">①AssumeRole</text>

  <rect x="230" y="504" width="120" height="68" rx="8" fill="#8e44ad"/>
  <text x="290" y="524" text-anchor="middle" font-size="10" font-weight="bold" fill="white">AWS STS</text>
  <text x="290" y="540" text-anchor="middle" font-size="9" fill="#e8d5f5">Validate Trust Policy</text>
  <text x="290" y="554" text-anchor="middle" font-size="9" fill="#e8d5f5">Issue Temp Credentials</text>

  <path d="M 350 538 L 410 538" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>
  <text x="380" y="530" text-anchor="middle" font-size="8" fill="#27ae60">②Temp Credentials</text>

  <rect x="410" y="504" width="140" height="68" rx="8" fill="#f39c12"/>
  <text x="480" y="524" text-anchor="middle" font-size="10" font-weight="bold" fill="white">CoreCrossAccountRole</text>
  <text x="480" y="540" text-anchor="middle" font-size="9" fill="#fef9e7">Account: 111</text>
  <text x="480" y="554" text-anchor="middle" font-size="9" fill="#fef9e7">s3:GetObject permission</text>

  <path d="M 550 538 L 610 538" stroke="#1a6faf" stroke-width="2" fill="none" marker-end="url(#arr-b)"/>
  <text x="580" y="530" text-anchor="middle" font-size="8" fill="#1a6faf">③Access Request</text>

  <rect x="610" y="504" width="140" height="68" rx="8" fill="#1a6faf"/>
  <text x="680" y="524" text-anchor="middle" font-size="10" font-weight="bold" fill="white">core-shared Bucket</text>
  <text x="680" y="540" text-anchor="middle" font-size="9" fill="#cce5ff">Bucket Policy Check</text>
  <text x="680" y="554" text-anchor="middle" font-size="9" fill="#cce5ff">Allow Account 111 access</text>

  <path d="M 750 538 L 810 538" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>
  <text x="780" y="530" text-anchor="middle" font-size="8" fill="#27ae60">④Return Data</text>

  <rect x="810" y="504" width="100" height="68" rx="8" fill="#2c3e50"/>
  <text x="860" y="524" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Success</text>
  <text x="860" y="540" text-anchor="middle" font-size="9" fill="#aaa">Data returned</text>
  <text x="860" y="554" text-anchor="middle" font-size="9" fill="#aaa">Dev Lambda</text>

  <rect x="0" y="600" width="960" height="20" fill="#1a252f"/>
  <text x="480" y="614" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 7/10 — S3 Cross-Account Permissions</text>
</svg>
