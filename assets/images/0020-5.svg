<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 740" width="1000" height="740" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#c0392b"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000028"/></filter>
  </defs>

  <rect width="1000" height="740" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1000" height="48" fill="#1a252f"/>
  <text x="500" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">⑤ IAM User vs IAM Role — What is the Difference?</text>

  <!-- ══ IAM USER ══ -->
  <rect x="30" y="58" width="440" height="360" rx="14" fill="#fde8e8" stroke="#c0392b" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="58" width="440" height="34" rx="14" fill="#c0392b"/>
  <rect x="30" y="78" width="440" height="14" fill="#c0392b"/>
  <text x="250" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">IAM User  👤</text>

  <text x="50" y="114" font-size="11" font-weight="bold" fill="#333">What is it?</text>
  <rect x="50" y="120" width="400" height="44" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="250" y="138" text-anchor="middle" font-size="10" fill="#555">A permanent identity tied to a real person or application.</text>
  <text x="250" y="153" text-anchor="middle" font-size="10" fill="#555">Has long-term credentials: Access Key ID + Secret Access Key.</text>

  <text x="50" y="182" font-size="11" font-weight="bold" fill="#333">Credentials</text>
  <rect x="50" y="188" width="400" height="54" rx="6" fill="#fdf2f2" stroke="#c0392b" stroke-width="1"/>
  <text x="250" y="206" text-anchor="middle" font-size="10" fill="#c0392b">Access Key: AKIAIOSFODNN7EXAMPLE</text>
  <text x="250" y="221" text-anchor="middle" font-size="10" fill="#c0392b">Secret Key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY</text>
  <text x="250" y="236" text-anchor="middle" font-size="9" fill="#e74c3c">⚠ Never expires unless manually rotated!</text>

  <text x="50" y="262" font-size="11" font-weight="bold" fill="#333">Problems with IAM Users for automation</text>
  <rect x="50" y="268" width="400" height="130" rx="6" fill="#922b21"/>
  <text x="66" y="288" font-size="10" fill="#fde8e8">✗  Keys can be leaked in git commits</text>
  <text x="66" y="306" font-size="10" fill="#fde8e8">✗  Keys never expire — permanent risk if stolen</text>
  <text x="66" y="324" font-size="10" fill="#fde8e8">✗  Cannot be used across accounts natively</text>
  <text x="66" y="342" font-size="10" fill="#fde8e8">✗  Hard to audit "which service used this key"</text>
  <text x="66" y="360" font-size="10" fill="#fde8e8">✗  Rotation is manual and error-prone</text>
  <text x="66" y="378" font-size="10" fill="#fde8e8">✗  AWS best practice: avoid for services/Lambda</text>

  <!-- ══ IAM ROLE ══ -->
  <rect x="530" y="58" width="440" height="360" rx="14" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#sh)"/>
  <rect x="530" y="58" width="440" height="34" rx="14" fill="#27ae60"/>
  <rect x="530" y="78" width="440" height="14" fill="#27ae60"/>
  <text x="750" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="white">IAM Role  🎭</text>

  <text x="550" y="114" font-size="11" font-weight="bold" fill="#333">What is it?</text>
  <rect x="550" y="120" width="400" height="44" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="750" y="138" text-anchor="middle" font-size="10" fill="#555">A temporary identity that can be assumed by anyone trusted.</text>
  <text x="750" y="153" text-anchor="middle" font-size="10" fill="#555">Issues short-lived credentials via AWS STS (15min–12h).</text>

  <text x="550" y="182" font-size="11" font-weight="bold" fill="#333">Credentials (Temporary)</text>
  <rect x="550" y="188" width="400" height="54" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="750" y="206" text-anchor="middle" font-size="10" fill="#27ae60">AccessKeyId:     ASIAIOSFODNN7EXAMPLE</text>
  <text x="750" y="221" text-anchor="middle" font-size="10" fill="#27ae60">SecretAccessKey: (temporary)</text>
  <text x="750" y="236" text-anchor="middle" font-size="9" fill="#1e8449">✓ Auto-expires! Useless after session ends.</text>

  <text x="550" y="262" font-size="11" font-weight="bold" fill="#333">Why Roles are used in this architecture</text>
  <rect x="550" y="268" width="400" height="130" rx="6" fill="#1e8449"/>
  <text x="566" y="288" font-size="10" fill="#d5f5e3">✓  Lambda automatically gets a Role (Execution Role)</text>
  <text x="566" y="306" font-size="10" fill="#d5f5e3">✓  Credentials auto-rotate — zero manual work</text>
  <text x="566" y="324" font-size="10" fill="#d5f5e3">✓  Cross-account access via Trust Policy</text>
  <text x="566" y="342" font-size="10" fill="#d5f5e3">✓  CloudTrail logs exactly which Role did what</text>
  <text x="566" y="360" font-size="10" fill="#d5f5e3">✓  No secrets to store, rotate, or leak</text>
  <text x="566" y="378" font-size="10" fill="#d5f5e3">✓  AWS recommended for all service-to-service auth</text>

  <!-- ══ HOW LAMBDA USES A ROLE ══ -->
  <rect x="30" y="436" width="940" height="170" rx="12" fill="white" stroke="#8e44ad" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="436" width="940" height="28" rx="12" fill="#8e44ad"/>
  <text x="500" y="455" text-anchor="middle" font-size="12" font-weight="bold" fill="white">How Lambda uses an IAM Role — Zero credentials in code</text>

  <rect x="50" y="472" width="130" height="110" rx="8" fill="#e67e22"/>
  <text x="115" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Your Lambda</text>
  <text x="115" y="510" text-anchor="middle" font-size="9" fill="#fde8c8">dev-app-fn</text>
  <text x="115" y="526" text-anchor="middle" font-size="9" fill="#fde8c8">No keys in code!</text>
  <text x="115" y="542" text-anchor="middle" font-size="9" fill="#fde8c8">boto3.client('s3')</text>
  <text x="115" y="558" text-anchor="middle" font-size="9" fill="#fde8c8">just works ✓</text>

  <path d="M 180 527 L 220 527" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="200" y="520" text-anchor="middle" font-size="8" fill="#555">auto</text>

  <rect x="220" y="472" width="160" height="110" rx="8" fill="#8e44ad"/>
  <text x="300" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Lambda Service</text>
  <text x="300" y="510" text-anchor="middle" font-size="9" fill="#e8d5f5">Detects attached Role</text>
  <text x="300" y="526" text-anchor="middle" font-size="9" fill="#e8d5f5">Calls STS internally</text>
  <text x="300" y="542" text-anchor="middle" font-size="9" fill="#e8d5f5">Gets temp credentials</text>
  <text x="300" y="558" text-anchor="middle" font-size="9" fill="#e8d5f5">Injects into env vars</text>

  <path d="M 380 527 L 420 527" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="400" y="520" text-anchor="middle" font-size="8" fill="#555">injects</text>

  <rect x="420" y="472" width="180" height="110" rx="8" fill="#f39c12"/>
  <text x="510" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Execution Role</text>
  <text x="510" y="510" text-anchor="middle" font-size="9" fill="#fef9e7">DevLambdaRole</text>
  <text x="510" y="526" text-anchor="middle" font-size="9" fill="#fef9e7">Permissions:</text>
  <text x="510" y="542" text-anchor="middle" font-size="9" fill="#fef9e7">s3:GetObject on dev-bucket</text>
  <text x="510" y="558" text-anchor="middle" font-size="9" fill="#fef9e7">logs:CreateLogGroup</text>

  <path d="M 600 527 L 640 527" stroke="#555" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="620" y="520" text-anchor="middle" font-size="8" fill="#555">allows</text>

  <rect x="640" y="472" width="140" height="110" rx="8" fill="#1a6faf"/>
  <text x="710" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="white">S3 Bucket</text>
  <text x="710" y="510" text-anchor="middle" font-size="9" fill="#cce5ff">dev-app bucket</text>
  <text x="710" y="526" text-anchor="middle" font-size="9" fill="#cce5ff">Checks Role ARN</text>
  <text x="710" y="542" text-anchor="middle" font-size="9" fill="#cce5ff">in request</text>
  <text x="710" y="558" text-anchor="middle" font-size="9" fill="#aad4f5">✓ Access granted</text>

  <rect x="800" y="472" width="150" height="110" rx="8" fill="#2c3e50"/>
  <text x="875" y="494" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Key Insight</text>
  <text x="875" y="512" text-anchor="middle" font-size="9" fill="#aaa">No passwords.</text>
  <text x="875" y="528" text-anchor="middle" font-size="9" fill="#aaa">No access keys.</text>
  <text x="875" y="544" text-anchor="middle" font-size="9" fill="#aaa">No secrets to leak.</text>
  <text x="875" y="560" text-anchor="middle" font-size="9" fill="#27ae60">AWS handles it all.</text>

  <!-- ══ COMPARISON TABLE ══ -->
  <rect x="30" y="622" width="940" height="88" rx="10" fill="white" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
  <rect x="30" y="622" width="940" height="26" rx="10" fill="#2c3e50"/>
  <text x="500" y="640" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Quick Comparison</text>
  <rect x="30" y="648" width="188" height="24" fill="#ecf0f1"/><text x="124" y="664" text-anchor="middle" font-size="10" font-weight="bold" fill="#333">Property</text>
  <rect x="218" y="648" width="188" height="24" fill="#fde8e8"/><text x="312" y="664" text-anchor="middle" font-size="10" fill="#c0392b">IAM User</text>
  <rect x="406" y="648" width="188" height="24" fill="#d5f5e3"/><text x="500" y="664" text-anchor="middle" font-size="10" fill="#27ae60">IAM Role</text>
  <rect x="594" y="648" width="188" height="24" fill="#d5e8f7"/><text x="688" y="664" text-anchor="middle" font-size="10" fill="#1a6faf">Used in this project?</text>
  <rect x="782" y="648" width="188" height="24" fill="#fef9e7"/><text x="876" y="664" text-anchor="middle" font-size="10" fill="#f39c12">Recommended for</text>
  <rect x="30" y="672" width="188" height="24" fill="#f8f9fa"/><text x="124" y="688" text-anchor="middle" font-size="9" fill="#555">Credential lifetime</text>
  <rect x="218" y="672" width="188" height="24" fill="#fde8e8"/><text x="312" y="688" text-anchor="middle" font-size="9" fill="#c0392b">Permanent (until deleted)</text>
  <rect x="406" y="672" width="188" height="24" fill="#d5f5e3"/><text x="500" y="688" text-anchor="middle" font-size="9" fill="#27ae60">Temporary (15min–12h)</text>
  <rect x="594" y="672" width="188" height="24" fill="#d5f5e3"/><text x="688" y="688" text-anchor="middle" font-size="9" fill="#27ae60">✓ Roles only</text>
  <rect x="782" y="672" width="188" height="24" fill="#fef9e7"/><text x="876" y="688" text-anchor="middle" font-size="9" fill="#f39c12">Human console login</text>
  <rect x="30" y="696" width="188" height="14" fill="#f8f9fa"/><text x="124" y="707" text-anchor="middle" font-size="9" fill="#555">Cross-account access</text>
  <rect x="218" y="696" width="188" height="14" fill="#fde8e8"/><text x="312" y="707" text-anchor="middle" font-size="9" fill="#c0392b">Complex / not native</text>
  <rect x="406" y="696" width="188" height="14" fill="#d5f5e3"/><text x="500" y="707" text-anchor="middle" font-size="9" fill="#27ae60">Built-in via Trust Policy</text>
  <rect x="594" y="696" width="188" height="14" fill="#d5f5e3"/><text x="688" y="707" text-anchor="middle" font-size="9" fill="#27ae60">✓ All cross-acct access</text>
  <rect x="782" y="696" width="188" height="14" fill="#d5f5e3"/><text x="876" y="707" text-anchor="middle" font-size="9" fill="#27ae60">Services, Lambda, EC2</text>

  <rect x="0" y="718" width="1000" height="22" fill="#1a252f"/>
  <text x="500" y="734" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 5/10 — IAM User vs IAM Role</text>
</svg>
