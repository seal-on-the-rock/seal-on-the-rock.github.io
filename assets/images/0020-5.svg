<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 680" width="1000" height="680" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#e67e22"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#1a6faf"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000025"/></filter>
  </defs>

  <rect width="1000" height="680" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1000" height="48" fill="#1a252f"/>
  <text x="500" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">⑨ CI/CD Pipeline — Dev → Staging → Prod Auto Deployment</text>

  <!-- Pipeline container -->
  <rect x="30" y="58" width="940" height="200" rx="12" fill="#1a252f" stroke="#e67e22" stroke-width="2" filter="url(#sh)"/>
  <text x="500" y="78" text-anchor="middle" font-size="12" font-weight="bold" fill="#e67e22">CodePipeline — Core Account (111111111111)</text>

  <!-- Stage 1: Source -->
  <rect x="50" y="88" width="150" height="150" rx="10" fill="#2c3e50" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="50" y="88" width="150" height="28" rx="10" fill="#e67e22"/>
  <text x="125" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white">① SOURCE</text>
  <text x="125" y="132" text-anchor="middle" font-size="11" fill="white">CodeCommit</text>
  <text x="125" y="148" text-anchor="middle" font-size="10" fill="#aaa">enterprise-cdk-repo</text>
  <text x="125" y="163" text-anchor="middle" font-size="10" fill="#aaa">Branch: main</text>
  <text x="125" y="178" text-anchor="middle" font-size="9" fill="#7f8c8d">Trigger: git push</text>
  <text x="125" y="193" text-anchor="middle" font-size="9" fill="#7f8c8d">Output: SourceArtifact</text>
  <text x="125" y="208" text-anchor="middle" font-size="9" fill="#7f8c8d">S3 Artifact Bucket</text>
  <text x="125" y="223" text-anchor="middle" font-size="9" fill="#7f8c8d">(encrypted)</text>

  <path d="M 200 163 L 230 163" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Stage 2: Build -->
  <rect x="230" y="88" width="150" height="150" rx="10" fill="#2c3e50" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="230" y="88" width="150" height="28" rx="10" fill="#e67e22"/>
  <text x="305" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white">② BUILD</text>
  <text x="305" y="132" text-anchor="middle" font-size="11" fill="white">CodeBuild</text>
  <text x="305" y="148" text-anchor="middle" font-size="10" fill="#aaa">Node.js 20 runtime</text>
  <text x="305" y="163" text-anchor="middle" font-size="10" fill="#aaa">npm ci</text>
  <text x="305" y="178" text-anchor="middle" font-size="10" fill="#aaa">npm run build (tsc)</text>
  <text x="305" y="193" text-anchor="middle" font-size="10" fill="#aaa">npx cdk synth</text>
  <text x="305" y="208" text-anchor="middle" font-size="9" fill="#7f8c8d">Output: cdk.out/</text>
  <text x="305" y="223" text-anchor="middle" font-size="9" fill="#7f8c8d">*.template.json</text>

  <path d="M 380 163 L 410 163" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Stage 3: Deploy Dev -->
  <rect x="410" y="88" width="150" height="150" rx="10" fill="#2c3e50" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="410" y="88" width="150" height="28" rx="10" fill="#27ae60"/>
  <text x="485" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white">③ DEPLOY DEV</text>
  <text x="485" y="132" text-anchor="middle" font-size="11" fill="white">CloudFormation</text>
  <text x="485" y="148" text-anchor="middle" font-size="10" fill="#aaa">Account: 222222222222</text>
  <text x="485" y="163" text-anchor="middle" font-size="10" fill="#aaa">Stack: DevAccountStack</text>
  <text x="485" y="178" text-anchor="middle" font-size="9" fill="#7f8c8d">Role: cdk-deploy-role</text>
  <text x="485" y="193" text-anchor="middle" font-size="9" fill="#7f8c8d">CAPABILITY_NAMED_IAM</text>
  <text x="485" y="208" text-anchor="middle" font-size="9" fill="#7f8c8d">CAPABILITY_AUTO_EXPAND</text>
  <text x="485" y="223" text-anchor="middle" font-size="9" fill="#a9dfbf">✓ Continue on success</text>

  <path d="M 560 163 L 590 163" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Stage 4: Deploy Staging -->
  <rect x="590" y="88" width="150" height="150" rx="10" fill="#2c3e50" stroke="#f39c12" stroke-width="1.5"/>
  <rect x="590" y="88" width="150" height="28" rx="10" fill="#f39c12"/>
  <text x="665" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white">④ DEPLOY STAGING</text>
  <text x="665" y="132" text-anchor="middle" font-size="11" fill="white">CloudFormation</text>
  <text x="665" y="148" text-anchor="middle" font-size="10" fill="#aaa">Account: 333333333333</text>
  <text x="665" y="163" text-anchor="middle" font-size="10" fill="#aaa">Stack: StagingAccountStack</text>
  <text x="665" y="178" text-anchor="middle" font-size="9" fill="#7f8c8d">Role: cdk-deploy-role</text>
  <text x="665" y="193" text-anchor="middle" font-size="9" fill="#7f8c8d">CAPABILITY_NAMED_IAM</text>
  <text x="665" y="208" text-anchor="middle" font-size="9" fill="#7f8c8d">CAPABILITY_AUTO_EXPAND</text>
  <text x="665" y="223" text-anchor="middle" font-size="9" fill="#fde8c8">✓ Continue on success</text>

  <path d="M 740 163 L 770 163" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Stage 5: Deploy Prod -->
  <rect x="770" y="88" width="180" height="150" rx="10" fill="#2c3e50" stroke="#c0392b" stroke-width="1.5"/>
  <rect x="770" y="88" width="180" height="28" rx="10" fill="#c0392b"/>
  <text x="860" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white">⑤ DEPLOY PROD</text>
  <text x="860" y="132" text-anchor="middle" font-size="11" fill="white">CloudFormation</text>
  <text x="860" y="148" text-anchor="middle" font-size="10" fill="#aaa">Account: 444444444444</text>
  <text x="860" y="163" text-anchor="middle" font-size="10" fill="#aaa">Stack: ProdAccountStack</text>
  <text x="860" y="178" text-anchor="middle" font-size="9" fill="#7f8c8d">Role: cdk-deploy-role</text>
  <text x="860" y="193" text-anchor="middle" font-size="9" fill="#7f8c8d">CAPABILITY_NAMED_IAM</text>
  <text x="860" y="208" text-anchor="middle" font-size="9" fill="#7f8c8d">CAPABILITY_AUTO_EXPAND</text>
  <text x="860" y="223" text-anchor="middle" font-size="9" fill="#f1948a">🔒 Final production deploy</text>

  <!-- CDK Bootstrap explanation -->
  <rect x="30" y="278" width="460" height="200" rx="10" fill="white" stroke="#1a6faf" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="278" width="460" height="28" rx="10" fill="#1a6faf"/>
  <text x="260" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="white">CDK Bootstrap — Required for each target account</text>

  <text x="46" y="322" font-size="10" fill="#333">Each target account must run bootstrap to create CDK prerequisite resources:</text>

  <rect x="46" y="332" width="200" height="28" rx="6" fill="#d5e8f7" stroke="#1a6faf" stroke-width="1"/>
  <text x="146" y="350" text-anchor="middle" font-size="10" fill="#1a6faf">S3 Staging Bucket</text>
  <rect x="256" y="332" width="218" height="28" rx="6" fill="#d5e8f7" stroke="#1a6faf" stroke-width="1"/>
  <text x="365" y="350" text-anchor="middle" font-size="10" fill="#1a6faf">ECR Repository (container images)</text>

  <rect x="46" y="368" width="200" height="28" rx="6" fill="#d5e8f7" stroke="#1a6faf" stroke-width="1"/>
  <text x="146" y="386" text-anchor="middle" font-size="10" fill="#1a6faf">cdk-deploy-role</text>
  <rect x="256" y="368" width="218" height="28" rx="6" fill="#d5e8f7" stroke="#1a6faf" stroke-width="1"/>
  <text x="365" y="386" text-anchor="middle" font-size="10" fill="#1a6faf">cdk-cfn-exec-role</text>

  <text x="46" y="416" font-size="10" fill="#555">Bootstrap command:</text>
  <rect x="46" y="424" width="428" height="44" rx="6" fill="#1a252f"/>
  <text x="260" y="440" text-anchor="middle" font-size="9" fill="#27ae60" font-family="monospace">npx cdk bootstrap aws://222222222222/ap-northeast-1 \</text>
  <text x="260" y="456" text-anchor="middle" font-size="9" fill="#27ae60" font-family="monospace">  --trust 111111111111</text>

  <!-- Artifact flow -->
  <rect x="510" y="278" width="460" height="200" rx="10" fill="white" stroke="#e67e22" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="510" y="278" width="460" height="28" rx="10" fill="#e67e22"/>
  <text x="740" y="297" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Artifact Flow</text>

  <rect x="526" y="314" width="100" height="52" rx="8" fill="#2c3e50"/>
  <text x="576" y="334" text-anchor="middle" font-size="10" fill="white">Source</text>
  <text x="576" y="350" text-anchor="middle" font-size="9" fill="#aaa">SourceOutput</text>
  <text x="576" y="364" text-anchor="middle" font-size="9" fill="#aaa">.zip</text>

  <path d="M 626 340 L 656 340" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <rect x="656" y="314" width="100" height="52" rx="8" fill="#2c3e50"/>
  <text x="706" y="334" text-anchor="middle" font-size="10" fill="white">Build</text>
  <text x="706" y="350" text-anchor="middle" font-size="9" fill="#aaa">BuildOutput</text>
  <text x="706" y="364" text-anchor="middle" font-size="9" fill="#aaa">cdk.out/</text>

  <path d="M 756 340 L 786 340" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <rect x="786" y="314" width="168" height="52" rx="8" fill="#2c3e50"/>
  <text x="870" y="334" text-anchor="middle" font-size="10" fill="white">Deploy Stages</text>
  <text x="870" y="350" text-anchor="middle" font-size="9" fill="#aaa">DevAccountStack.template.json</text>
  <text x="870" y="364" text-anchor="middle" font-size="9" fill="#aaa">StagingAccountStack.template.json</text>

  <text x="526" y="394" font-size="10" fill="#555">Artifact Bucket features:</text>
  <rect x="526" y="402" width="200" height="24" rx="4" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="626" y="418" text-anchor="middle" font-size="9" fill="#27ae60">✓ S3 encrypted storage</text>
  <rect x="736" y="402" width="218" height="24" rx="4" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="845" y="418" text-anchor="middle" font-size="9" fill="#27ae60">✓ crossAccountKeys: true</text>
  <rect x="526" y="434" width="200" height="24" rx="4" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="626" y="450" text-anchor="middle" font-size="9" fill="#27ae60">✓ autoDeleteObjects</text>
  <rect x="736" y="434" width="218" height="24" rx="4" fill="#e8f8f5" stroke="#27ae60" stroke-width="1"/>
  <text x="845" y="450" text-anchor="middle" font-size="9" fill="#27ae60">✓ Block Public Access</text>

  <!-- Failure handling -->
  <rect x="30" y="496" width="460" height="120" rx="10" fill="white" stroke="#c0392b" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="496" width="460" height="28" rx="10" fill="#c0392b"/>
  <text x="260" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Deployment Failure Handling</text>
  <rect x="46" y="532" width="200" height="72" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="1"/>
  <text x="146" y="550" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">Dev Deploy Failed</text>
  <text x="146" y="566" text-anchor="middle" font-size="9" fill="#555">Pipeline stops</text>
  <text x="146" y="580" text-anchor="middle" font-size="9" fill="#555">Staging / Prod skipped</text>
  <text x="146" y="594" text-anchor="middle" font-size="9" fill="#555">CloudFormation auto-rollback</text>
  <rect x="264" y="532" width="210" height="72" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="1"/>
  <text x="369" y="550" text-anchor="middle" font-size="10" font-weight="bold" fill="#c0392b">Staging Deploy Failed</text>
  <text x="369" y="566" text-anchor="middle" font-size="9" fill="#555">Pipeline stops</text>
  <text x="369" y="580" text-anchor="middle" font-size="9" fill="#555">Prod skipped</text>
  <text x="369" y="594" text-anchor="middle" font-size="9" fill="#555">Dev environment remains deployed</text>

  <!-- CDK deploy flow -->
  <rect x="510" y="496" width="460" height="120" rx="10" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="510" y="496" width="460" height="28" rx="10" fill="#27ae60"/>
  <text x="740" y="515" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Cross-Account Deploy Permission Chain</text>
  <text x="526" y="540" font-size="10" fill="#555">Pipeline (111) → AssumeRole → cdk-deploy-role (target account)</text>
  <text x="526" y="558" font-size="10" fill="#555">cdk-deploy-role → calls CloudFormation CreateChangeSet / ExecuteChangeSet</text>
  <text x="526" y="576" font-size="10" fill="#555">CloudFormation → uses cdk-cfn-exec-role to create/update actual resources</text>
  <rect x="526" y="586" width="428" height="24" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="740" y="602" text-anchor="middle" font-size="9" fill="#27ae60">💡 Pipeline account (111) never needs direct resource permissions in target accounts</text>

  <!-- Key insight -->
  <rect x="30" y="630" width="940" height="30" rx="8" fill="#fff3cd" stroke="#f39c12" stroke-width="1"/>
  <text x="500" y="650" text-anchor="middle" font-size="10" fill="#856404">💡 Fully automated: developers only need to git push → main. Pipeline handles build, test, and cross-account deployment automatically.</text>

  <rect x="0" y="660" width="1000" height="20" fill="#1a252f"/>
  <text x="500" y="674" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 9/10 — CI/CD Pipeline</text>
</svg>
