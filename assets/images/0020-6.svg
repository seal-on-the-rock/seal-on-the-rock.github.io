<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#c0392b"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000028"/></filter>
  </defs>

  <rect width="1000" height="720" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1000" height="48" fill="#1a252f"/>
  <text x="500" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">② Why Multi-Account? Single vs Multi-Account Comparison</text>

  <!-- ══ LEFT: Single Account (BAD) ══ -->
  <rect x="30" y="58" width="440" height="490" rx="14" fill="#fde8e8" stroke="#c0392b" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="30" y="58" width="440" height="36" rx="14" fill="#c0392b"/>
  <rect x="30" y="80" width="440" height="14" fill="#c0392b"/>
  <text x="250" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">❌  Single Account Approach</text>

  <!-- Single account box -->
  <rect x="50" y="106" width="400" height="420" rx="10" fill="#fdf2f2" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="250" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">AWS Account: 111111111111</text>

  <!-- All envs crammed in -->
  <rect x="66" y="136" width="368" height="60" rx="8" fill="#f1948a"/>
  <text x="250" y="156" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Dev Resources</text>
  <text x="250" y="172" text-anchor="middle" font-size="9" fill="#fde8e8">Lambda-dev · S3-dev · RDS-dev · IAM policies</text>
  <text x="250" y="185" text-anchor="middle" font-size="9" fill="#fde8e8">VPC 10.0.0.0/16 (shared)</text>

  <rect x="66" y="206" width="368" height="60" rx="8" fill="#e74c3c"/>
  <text x="250" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Staging Resources</text>
  <text x="250" y="242" text-anchor="middle" font-size="9" fill="#fde8e8">Lambda-stg · S3-stg · RDS-stg · IAM policies</text>
  <text x="250" y="255" text-anchor="middle" font-size="9" fill="#fde8e8">VPC 10.0.0.0/16 (shared)</text>

  <rect x="66" y="276" width="368" height="60" rx="8" fill="#c0392b"/>
  <text x="250" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Production Resources</text>
  <text x="250" y="312" text-anchor="middle" font-size="9" fill="#fde8e8">Lambda-prod · S3-prod · RDS-prod · IAM policies</text>
  <text x="250" y="325" text-anchor="middle" font-size="9" fill="#fde8e8">VPC 10.0.0.0/16 (shared)</text>

  <!-- Problems -->
  <rect x="66" y="350" width="368" height="160" rx="8" fill="#922b21"/>
  <text x="250" y="370" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffd700">⚠ Problems</text>
  <text x="80" y="390" font-size="10" fill="#fde8e8">✗  A dev mistake can delete prod S3 bucket</text>
  <text x="80" y="408" font-size="10" fill="#fde8e8">✗  IAM policies become a tangled mess</text>
  <text x="80" y="426" font-size="10" fill="#fde8e8">✗  AWS service limits shared across all envs</text>
  <text x="80" y="444" font-size="10" fill="#fde8e8">✗  Cost reporting: impossible to separate</text>
  <text x="80" y="462" font-size="10" fill="#fde8e8">✗  Security breach in dev = prod exposed</text>
  <text x="80" y="480" font-size="10" fill="#fde8e8">✗  Compliance audit covers everything at once</text>
  <text x="80" y="498" font-size="10" fill="#fde8e8">✗  No blast radius containment</text>

  <!-- ══ RIGHT: Multi Account (GOOD) ══ -->
  <rect x="530" y="58" width="440" height="490" rx="14" fill="#d5f5e3" stroke="#27ae60" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="530" y="58" width="440" height="36" rx="14" fill="#27ae60"/>
  <rect x="530" y="80" width="440" height="14" fill="#27ae60"/>
  <text x="750" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="white">✅  Multi-Account Approach</text>

  <!-- 4 separate accounts -->
  <rect x="550" y="106" width="400" height="80" rx="8" fill="#1a6faf" filter="url(#sh)"/>
  <text x="750" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Core Account (111) — Management</text>
  <text x="750" y="142" text-anchor="middle" font-size="9" fill="#cce5ff">CloudTrail · GuardDuty · Config · Pipeline</text>
  <text x="750" y="156" text-anchor="middle" font-size="9" fill="#cce5ff">Centralized security &amp; audit</text>
  <text x="750" y="170" text-anchor="middle" font-size="9" fill="#aad4f5">Hard boundary — no app code here</text>

  <rect x="550" y="196" width="400" height="70" rx="8" fill="#27ae60" filter="url(#sh)"/>
  <text x="750" y="216" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Dev Account (222) — Isolated</text>
  <text x="750" y="232" text-anchor="middle" font-size="9" fill="#d5f5e3">Own VPC · Own IAM · Own S3 · Own limits</text>
  <text x="750" y="248" text-anchor="middle" font-size="9" fill="#a9dfbf">Developers can experiment freely — no prod risk</text>

  <rect x="550" y="276" width="400" height="70" rx="8" fill="#f39c12" filter="url(#sh)"/>
  <text x="750" y="296" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Staging Account (333) — Isolated</text>
  <text x="750" y="312" text-anchor="middle" font-size="9" fill="#fef9e7">Own VPC · Own IAM · Own S3 · Own limits</text>
  <text x="750" y="328" text-anchor="middle" font-size="9" fill="#fde8c8">Mirror of prod — safe pre-release validation</text>

  <rect x="550" y="356" width="400" height="70" rx="8" fill="#c0392b" filter="url(#sh)"/>
  <text x="750" y="376" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Prod Account (444) — Locked Down</text>
  <text x="750" y="392" text-anchor="middle" font-size="9" fill="#fde8e8">Own VPC · Own IAM · Own S3 · Own limits</text>
  <text x="750" y="408" text-anchor="middle" font-size="9" fill="#f1948a">Only Core can assume role — strictest access</text>

  <!-- Benefits -->
  <rect x="550" y="436" width="400" height="90" rx="8" fill="#1e8449"/>
  <text x="750" y="456" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffd700">✓ Benefits</text>
  <text x="564" y="474" font-size="10" fill="#d5f5e3">✓  Blast radius contained — dev issue can't touch prod</text>
  <text x="564" y="490" font-size="10" fill="#d5f5e3">✓  Per-account cost tracking via AWS Cost Explorer</text>
  <text x="564" y="506" font-size="10" fill="#d5f5e3">✓  Independent service limits per environment</text>
  <text x="564" y="522" font-size="10" fill="#d5f5e3">✓  Compliance scope reduced (audit only prod)</text>

  <!-- ══ BLAST RADIUS diagram ══ -->
  <rect x="30" y="566" width="940" height="120" rx="12" fill="#1a252f" filter="url(#sh)"/>
  <text x="500" y="586" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Blast Radius Containment — What happens when a dev accidentally deletes resources?</text>

  <!-- Single account blast -->
  <rect x="50" y="596" width="200" height="72" rx="8" fill="#c0392b"/>
  <text x="150" y="614" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Single Account</text>
  <text x="150" y="630" text-anchor="middle" font-size="9" fill="#fde8e8">Dev deletes S3 bucket</text>
  <text x="150" y="644" text-anchor="middle" font-size="9" fill="#fde8e8">→ Could be PROD bucket!</text>
  <text x="150" y="658" text-anchor="middle" font-size="9" fill="#ffd700">💥 Full outage possible</text>

  <text x="290" y="636" text-anchor="middle" font-size="20" fill="#e67e22">vs</text>

  <!-- Multi account blast -->
  <rect x="320" y="596" width="630" height="72" rx="8" fill="#1e8449"/>
  <text x="635" y="614" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Multi-Account</text>
  <text x="430" y="632" text-anchor="middle" font-size="9" fill="#d5f5e3">Dev deletes S3 in Dev account</text>
  <text x="430" y="648" text-anchor="middle" font-size="9" fill="#d5f5e3">→ Only Dev affected</text>
  <text x="430" y="662" text-anchor="middle" font-size="9" fill="#a9dfbf">✓ Staging/Prod untouched</text>
  <text x="700" y="632" text-anchor="middle" font-size="9" fill="#d5f5e3">Account boundary = hard wall</text>
  <text x="700" y="648" text-anchor="middle" font-size="9" fill="#d5f5e3">IAM cannot cross accounts</text>
  <text x="700" y="662" text-anchor="middle" font-size="9" fill="#a9dfbf">✓ without explicit Role trust</text>

  <rect x="0" y="698" width="1000" height="22" fill="#1a252f"/>
  <text x="500" y="714" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 2/10 — Why Multi-Account Architecture</text>
</svg>
