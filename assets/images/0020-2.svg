<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
    <marker id="arr-b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#1a6faf"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000025"/></filter>
  </defs>

  <rect width="1000" height="700" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1000" height="48" fill="#1a252f"/>
  <text x="500" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">④ VPC Network Structure &amp; Transit Gateway Connectivity</text>

  <!-- ── Core VPC ── -->
  <rect x="30" y="60" width="290" height="310" rx="12" fill="#d5e8f7" stroke="#1a6faf" stroke-width="2" filter="url(#sh)"/>
  <text x="175" y="82" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6faf">Core VPC — 10.0.0.0/16</text>
  <text x="175" y="96" text-anchor="middle" font-size="10" fill="#555">Account: 111111111111</text>

  <rect x="46" y="106" width="258" height="44" rx="6" fill="#aed6f1" stroke="#2980b9" stroke-width="1"/>
  <text x="175" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a5c">🌐 Public Subnet</text>
  <text x="175" y="140" text-anchor="middle" font-size="10" fill="#1a3a5c">10.0.0.0/24 · 10.0.1.0/24  |  IGW ↑</text>

  <rect x="46" y="160" width="258" height="44" rx="6" fill="#85c1e9" stroke="#2980b9" stroke-width="1"/>
  <text x="175" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a3a5c">🔒 Private Subnet</text>
  <text x="175" y="194" text-anchor="middle" font-size="10" fill="#1a3a5c">10.0.2.0/24 · 10.0.3.0/24  |  NAT ↑</text>

  <rect x="46" y="214" width="258" height="44" rx="6" fill="#5dade2" stroke="#2980b9" stroke-width="1"/>
  <text x="175" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="white">🗄 DB Subnet (Isolated)</text>
  <text x="175" y="248" text-anchor="middle" font-size="10" fill="white">10.0.4.0/28 · 10.0.5.0/28  |  No route</text>

  <rect x="46" y="268" width="120" height="36" rx="6" fill="#2980b9"/>
  <text x="106" y="283" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Internet GW</text>
  <text x="106" y="296" text-anchor="middle" font-size="9" fill="#ddd">Public → Internet</text>
  <rect x="178" y="268" width="126" height="36" rx="6" fill="#2980b9"/>
  <text x="241" y="283" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NAT Gateway</text>
  <text x="241" y="296" text-anchor="middle" font-size="9" fill="#ddd">Private → Internet</text>

  <rect x="46" y="314" width="258" height="36" rx="6" fill="#1a6faf"/>
  <text x="175" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="white">VPC Flow Logs → CloudWatch</text>
  <text x="175" y="342" text-anchor="middle" font-size="9" fill="#cce5ff">ALL traffic logged</text>

  <!-- ── Dev VPC ── -->
  <rect x="30" y="390" width="290" height="220" rx="12" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#sh)"/>
  <text x="175" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#27ae60">Dev VPC — 10.1.0.0/16</text>
  <text x="175" y="426" text-anchor="middle" font-size="10" fill="#555">Account: 222222222222</text>
  <rect x="46" y="436" width="258" height="36" rx="6" fill="#a9dfbf" stroke="#27ae60" stroke-width="1"/>
  <text x="175" y="450" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a2c">🌐 Public  10.1.0.0/24 · 10.1.1.0/24</text>
  <text x="175" y="464" text-anchor="middle" font-size="9" fill="#555">→ IGW</text>
  <rect x="46" y="480" width="258" height="36" rx="6" fill="#82e0aa" stroke="#27ae60" stroke-width="1"/>
  <text x="175" y="494" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a2c">🔒 Private  10.1.2.0/24 · 10.1.3.0/24</text>
  <text x="175" y="508" text-anchor="middle" font-size="9" fill="#555">→ NAT  |  TGW Attachment ★</text>
  <rect x="46" y="524" width="258" height="36" rx="6" fill="#1e8449" stroke="#27ae60" stroke-width="1"/>
  <text x="175" y="538" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🗄 DB  10.1.4.0/28 · 10.1.5.0/28</text>
  <text x="175" y="552" text-anchor="middle" font-size="9" fill="#ddd">Isolated — No route</text>
  <rect x="46" y="568" width="258" height="28" rx="6" fill="#27ae60"/>
  <text x="175" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="white">VPC Flow Logs → CloudWatch</text>

  <!-- ── Staging VPC ── -->
  <rect x="360" y="390" width="290" height="220" rx="12" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#sh)"/>
  <text x="505" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#f39c12">Staging VPC — 10.2.0.0/16</text>
  <text x="505" y="426" text-anchor="middle" font-size="10" fill="#555">Account: 333333333333</text>
  <rect x="376" y="436" width="258" height="36" rx="6" fill="#fdebd0" stroke="#f39c12" stroke-width="1"/>
  <text x="505" y="450" text-anchor="middle" font-size="10" font-weight="bold" fill="#5d3a00">🌐 Public  10.2.0.0/24 · 10.2.1.0/24</text>
  <text x="505" y="464" text-anchor="middle" font-size="9" fill="#555">→ IGW</text>
  <rect x="376" y="480" width="258" height="36" rx="6" fill="#f8c471" stroke="#f39c12" stroke-width="1"/>
  <text x="505" y="494" text-anchor="middle" font-size="10" font-weight="bold" fill="#5d3a00">🔒 Private  10.2.2.0/24 · 10.2.3.0/24</text>
  <text x="505" y="508" text-anchor="middle" font-size="9" fill="#555">→ NAT  |  TGW Attachment ★</text>
  <rect x="376" y="524" width="258" height="36" rx="6" fill="#e67e22" stroke="#f39c12" stroke-width="1"/>
  <text x="505" y="538" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🗄 DB  10.2.4.0/28 · 10.2.5.0/28</text>
  <text x="505" y="552" text-anchor="middle" font-size="9" fill="#fde8c8">Isolated — No route</text>
  <rect x="376" y="568" width="258" height="28" rx="6" fill="#f39c12"/>
  <text x="505" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="white">VPC Flow Logs → CloudWatch</text>

  <!-- ── Prod VPC ── -->
  <rect x="690" y="390" width="290" height="220" rx="12" fill="#fde8e8" stroke="#c0392b" stroke-width="2" filter="url(#sh)"/>
  <text x="835" y="412" text-anchor="middle" font-size="12" font-weight="bold" fill="#c0392b">Prod VPC — 10.3.0.0/16</text>
  <text x="835" y="426" text-anchor="middle" font-size="10" fill="#555">Account: 444444444444  (3 AZs)</text>
  <rect x="706" y="436" width="258" height="36" rx="6" fill="#f1948a" stroke="#c0392b" stroke-width="1"/>
  <text x="835" y="450" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🌐 Public  10.3.0-2.0/24 (a/b/c)</text>
  <text x="835" y="464" text-anchor="middle" font-size="9" fill="#fde8e8">→ IGW</text>
  <rect x="706" y="480" width="258" height="36" rx="6" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="835" y="494" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🔒 Private  10.3.3-5.0/24 (a/b/c)</text>
  <text x="835" y="508" text-anchor="middle" font-size="9" fill="#fde8e8">→ NAT  |  TGW Attachment ★</text>
  <rect x="706" y="524" width="258" height="36" rx="6" fill="#922b21" stroke="#c0392b" stroke-width="1"/>
  <text x="835" y="538" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🗄 DB  10.3.6-8.0/28 (a/b/c)</text>
  <text x="835" y="552" text-anchor="middle" font-size="9" fill="#fde8e8">Isolated — No route</text>
  <rect x="706" y="568" width="258" height="28" rx="6" fill="#c0392b"/>
  <text x="835" y="586" text-anchor="middle" font-size="9" font-weight="bold" fill="white">VPC Flow Logs → CloudWatch</text>

  <!-- ── Transit Gateway ── -->
  <rect x="360" y="60" width="620" height="80" rx="12" fill="#2c3e50" filter="url(#sh)"/>
  <text x="670" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="white">🔀 Transit Gateway</text>
  <text x="670" y="108" text-anchor="middle" font-size="11" fill="#aaa">tgw-enterprise-ap-northeast-1</text>
  <text x="670" y="124" text-anchor="middle" font-size="10" fill="#7f8c8d">All 4 VPCs (Core/Dev/Staging/Prod) attach their Private Subnets to TGW — TGW is a region-level resource, NOT inside any VPC</text>

  <!-- TGW arrows — all originate from each VPC's Private Subnet -->

  <!-- Core VPC Private Subnet (y=160, center x=175) → TGW left edge (x=360) -->
  <path d="M 175 178 Q 175 100 360 100" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="6,3" fill="none" marker-end="url(#arr)"/>
  <text x="220" y="118" font-size="9" fill="#c0392b">TGW Attach (Core Private)</text>

  <!-- Dev VPC Private Subnet (y=480, center x=175) → TGW bottom-left -->
  <path d="M 175 498 Q 175 560 360 560 Q 420 560 420 140" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="6,3" fill="none" marker-end="url(#arr)"/>
  <text x="60" y="540" font-size="9" fill="#c0392b">TGW Attach (Dev Private)</text>

  <!-- Staging VPC Private Subnet (y=480, center x=505) → TGW bottom -->
  <line x1="505" y1="480" x2="505" y2="140" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="515" y="330" font-size="9" fill="#c0392b">TGW Attach (Staging Private)</text>

  <!-- Prod VPC Private Subnet (y=480, center x=835) → TGW right edge -->
  <line x1="835" y1="480" x2="835" y2="140" stroke="#c0392b" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="845" y="330" font-size="9" fill="#c0392b">TGW Attach (Prod Private)</text>

  <!-- Key note -->
  <rect x="30" y="628" width="940" height="44" rx="8" fill="#fff3cd" stroke="#f39c12" stroke-width="1"/>
  <text x="500" y="646" text-anchor="middle" font-size="11" font-weight="bold" fill="#856404">★ TGW Connectivity Rules</text>
  <text x="500" y="662" text-anchor="middle" font-size="10" fill="#856404">Only Private Subnets attach to TGW. Public/DB Subnets do not participate in cross-account routing. DB Subnets are fully isolated with no outbound routes.</text>

  <rect x="0" y="680" width="1000" height="20" fill="#1a252f"/>
  <text x="500" y="694" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 4/10 — VPC Network &amp; Transit Gateway</text>
</svg>
