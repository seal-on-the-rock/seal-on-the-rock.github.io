<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#c0392b"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000028"/></filter>
  </defs>

  <rect width="1000" height="700" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1000" height="48" fill="#1a252f"/>
  <text x="500" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">③ 3-Tier Subnet Design — Why Not Just Use Public Subnets?</text>

  <!-- ══ INTERNET ══ -->
  <rect x="420" y="58" width="160" height="44" rx="10" fill="#2c3e50"/>
  <text x="500" y="78" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🌐 Internet</text>
  <text x="500" y="94" text-anchor="middle" font-size="9" fill="#aaa">0.0.0.0/0</text>

  <!-- ══ VPC WRAPPER ══ -->
  <rect x="30" y="116" width="940" height="460" rx="14" fill="#eaf4fb" stroke="#2980b9" stroke-width="2" filter="url(#sh)"/>
  <text x="500" y="136" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a6faf">VPC — 10.x.0.0/16  (same design in all 4 accounts)</text>

  <!-- IGW -->
  <rect x="420" y="144" width="160" height="36" rx="8" fill="#2980b9"/>
  <text x="500" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Internet Gateway</text>
  <text x="500" y="172" text-anchor="middle" font-size="9" fill="#ddd">Attached to VPC</text>

  <!-- Arrow: Internet ↔ IGW -->
  <line x1="500" y1="102" x2="500" y2="144" stroke="#2980b9" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══ TIER 1: PUBLIC SUBNET ══ -->
  <rect x="50" y="194" width="900" height="100" rx="10" fill="#aed6f1" stroke="#2980b9" stroke-width="1.5"/>
  <text x="500" y="214" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a5c">🌐 Tier 1 — Public Subnet  (10.x.0.0/24, 10.x.1.0/24)</text>
  <text x="500" y="230" text-anchor="middle" font-size="10" fill="#1a3a5c">Route table: 0.0.0.0/0 → Internet Gateway  |  Has public IP</text>

  <rect x="70" y="242" width="180" height="40" rx="6" fill="#2980b9"/>
  <text x="160" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="white">NAT Gateway</text>
  <text x="160" y="272" text-anchor="middle" font-size="9" fill="#ddd">Sits here, has Elastic IP</text>

  <rect x="270" y="242" width="180" height="40" rx="6" fill="#2980b9"/>
  <text x="360" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Load Balancer (ALB)</text>
  <text x="360" y="272" text-anchor="middle" font-size="9" fill="#ddd">Public-facing entry point</text>

  <rect x="470" y="242" width="180" height="40" rx="6" fill="#2980b9"/>
  <text x="560" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Bastion Host</text>
  <text x="560" y="272" text-anchor="middle" font-size="9" fill="#ddd">SSH jump server (optional)</text>

  <rect x="670" y="242" width="260" height="40" rx="6" fill="#1557a0"/>
  <text x="800" y="258" text-anchor="middle" font-size="10" font-weight="bold" fill="white">⚠ Lambda / App Servers NOT here</text>
  <text x="800" y="272" text-anchor="middle" font-size="9" fill="#aad4f5">Direct internet exposure = attack surface</text>

  <!-- Arrow: IGW → Public -->
  <line x1="500" y1="180" x2="500" y2="194" stroke="#2980b9" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ══ TIER 2: PRIVATE SUBNET ══ -->
  <rect x="50" y="308" width="900" height="110" rx="10" fill="#85c1e9" stroke="#2980b9" stroke-width="1.5"/>
  <text x="500" y="328" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a3a5c">🔒 Tier 2 — Private Subnet  (10.x.2.0/24, 10.x.3.0/24)</text>
  <text x="500" y="344" text-anchor="middle" font-size="10" fill="#1a3a5c">Route table: 0.0.0.0/0 → NAT Gateway  |  No public IP  |  TGW Attachment here</text>

  <rect x="70" y="356" width="180" height="50" rx="6" fill="#e67e22"/>
  <text x="160" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Lambda Functions</text>
  <text x="160" y="388" text-anchor="middle" font-size="9" fill="#fde8c8">dev-app-fn, prod-app-fn</text>
  <text x="160" y="400" text-anchor="middle" font-size="9" fill="#fde8c8">Can reach internet via NAT</text>

  <rect x="270" y="356" width="180" height="50" rx="6" fill="#e67e22"/>
  <text x="360" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="white">App Servers / ECS</text>
  <text x="360" y="388" text-anchor="middle" font-size="9" fill="#fde8c8">Backend services</text>
  <text x="360" y="400" text-anchor="middle" font-size="9" fill="#fde8c8">Not reachable from internet</text>

  <rect x="470" y="356" width="180" height="50" rx="6" fill="#1a6faf"/>
  <text x="560" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="white">TGW Attachment</text>
  <text x="560" y="388" text-anchor="middle" font-size="9" fill="#cce5ff">Cross-account routing</text>
  <text x="560" y="400" text-anchor="middle" font-size="9" fill="#cce5ff">Only private traffic</text>

  <rect x="670" y="356" width="260" height="50" rx="6" fill="#1e8449"/>
  <text x="800" y="374" text-anchor="middle" font-size="10" font-weight="bold" fill="white">✓ Internet access via NAT</text>
  <text x="800" y="388" text-anchor="middle" font-size="9" fill="#d5f5e3">Outbound only (e.g. npm install, API calls)</text>
  <text x="800" y="400" text-anchor="middle" font-size="9" fill="#d5f5e3">Inbound from internet: BLOCKED</text>

  <!-- Arrow: Public NAT → Private -->
  <path d="M 160 282 Q 160 320 160 356" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#arr)"/>
  <text x="168" y="322" font-size="8" fill="#2980b9">NAT</text>

  <!-- ══ TIER 3: DB SUBNET ══ -->
  <rect x="50" y="432" width="900" height="110" rx="10" fill="#5dade2" stroke="#2980b9" stroke-width="1.5"/>
  <text x="500" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="white">🗄 Tier 3 — DB Subnet / Isolated  (10.x.4.0/28, 10.x.5.0/28)</text>
  <text x="500" y="468" text-anchor="middle" font-size="10" fill="white">Route table: LOCAL only  |  No internet route at all  |  /28 = only 16 IPs (intentionally small)</text>

  <rect x="70" y="480" width="180" height="50" rx="6" fill="#1557a0"/>
  <text x="160" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="white">RDS / Aurora</text>
  <text x="160" y="512" text-anchor="middle" font-size="9" fill="#cce5ff">Databases</text>
  <text x="160" y="524" text-anchor="middle" font-size="9" fill="#cce5ff">Only reachable from Private tier</text>

  <rect x="270" y="480" width="180" height="50" rx="6" fill="#1557a0"/>
  <text x="360" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="white">ElastiCache</text>
  <text x="360" y="512" text-anchor="middle" font-size="9" fill="#cce5ff">Redis / Memcached</text>
  <text x="360" y="524" text-anchor="middle" font-size="9" fill="#cce5ff">Cache layer</text>

  <rect x="470" y="480" width="460" height="50" rx="6" fill="#0d3b6e"/>
  <text x="700" y="498" text-anchor="middle" font-size="10" font-weight="bold" fill="white">🔒 Maximum Isolation</text>
  <text x="700" y="512" text-anchor="middle" font-size="9" fill="#aad4f5">No route to internet. No route to TGW. Cannot be reached from outside VPC.</text>
  <text x="700" y="524" text-anchor="middle" font-size="9" fill="#aad4f5">Even if Private subnet is compromised, attacker cannot reach DB directly.</text>

  <!-- ══ TRAFFIC FLOW SUMMARY ══ -->
  <rect x="30" y="556" width="940" height="110" rx="10" fill="white" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
  <rect x="30" y="556" width="940" height="26" rx="10" fill="#2c3e50"/>
  <text x="500" y="574" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Traffic Flow Summary — Who Can Talk to Whom?</text>

  <rect x="50" y="590" width="200" height="66" rx="6" fill="#aed6f1" stroke="#2980b9" stroke-width="1"/>
  <text x="150" y="608" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a5c">Internet → Public</text>
  <text x="150" y="622" text-anchor="middle" font-size="9" fill="#555">✓ ALB / Bastion only</text>
  <text x="150" y="636" text-anchor="middle" font-size="9" fill="#c0392b">✗ Lambda / App Server</text>
  <text x="150" y="650" text-anchor="middle" font-size="9" fill="#c0392b">✗ Database</text>

  <rect x="270" y="590" width="200" height="66" rx="6" fill="#85c1e9" stroke="#2980b9" stroke-width="1"/>
  <text x="370" y="608" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a5c">Private → Internet</text>
  <text x="370" y="622" text-anchor="middle" font-size="9" fill="#27ae60">✓ Via NAT (outbound only)</text>
  <text x="370" y="636" text-anchor="middle" font-size="9" fill="#27ae60">✓ API calls, package downloads</text>
  <text x="370" y="650" text-anchor="middle" font-size="9" fill="#c0392b">✗ Inbound from internet</text>

  <rect x="490" y="590" width="200" height="66" rx="6" fill="#5dade2" stroke="#2980b9" stroke-width="1"/>
  <text x="590" y="608" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Private → DB</text>
  <text x="590" y="622" text-anchor="middle" font-size="9" fill="white">✓ App servers can connect</text>
  <text x="590" y="636" text-anchor="middle" font-size="9" fill="white">✓ Lambda can connect</text>
  <text x="590" y="650" text-anchor="middle" font-size="9" fill="#fde8e8">✗ Public subnet cannot</text>

  <rect x="710" y="590" width="240" height="66" rx="6" fill="#1a252f" stroke="#27ae60" stroke-width="1"/>
  <text x="830" y="608" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">Security Principle</text>
  <text x="830" y="624" text-anchor="middle" font-size="9" fill="#aaa">Defense in depth:</text>
  <text x="830" y="638" text-anchor="middle" font-size="9" fill="#aaa">Each tier only trusts the tier</text>
  <text x="830" y="652" text-anchor="middle" font-size="9" fill="#aaa">directly above it.</text>

  <rect x="0" y="678" width="1000" height="22" fill="#1a252f"/>
  <text x="500" y="694" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 3/10 — 3-Tier Subnet Design</text>
</svg>
