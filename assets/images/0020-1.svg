<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#555"/>
    </marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000025"/></filter>
  </defs>

  <rect width="900" height="620" fill="#f5f7fa"/>
  <rect x="0" y="0" width="900" height="48" fill="#1a252f"/>
  <text x="450" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">① Multi-Account Organization Structure (AWS Organizations)</text>

  <!-- AWS Organizations wrapper -->
  <rect x="30" y="64" width="840" height="530" rx="16" fill="#eaf0fb" stroke="#3d5a99" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="88" text-anchor="middle" font-size="13" fill="#3d5a99" font-weight="bold">AWS Organizations — Root</text>

  <!-- Management / Core Account -->
  <rect x="310" y="100" width="280" height="130" rx="12" fill="#1a6faf" filter="url(#sh)"/>
  <text x="450" y="126" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Management Account</text>
  <text x="450" y="144" text-anchor="middle" font-size="11" fill="#cce5ff">Core / Security / Shared Services</text>
  <text x="450" y="160" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd700">111111111111</text>
  <text x="450" y="176" text-anchor="middle" font-size="10" fill="#aad4f5">CloudTrail · GuardDuty · Config</text>
  <text x="450" y="191" text-anchor="middle" font-size="10" fill="#aad4f5">CodePipeline · CloudWatch Dashboard</text>
  <text x="450" y="206" text-anchor="middle" font-size="10" fill="#aad4f5">Shared S3 · Cross-Account IAM Roles</text>

  <!-- Arrows down -->
  <line x1="370" y1="230" x2="200" y2="330" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="450" y1="230" x2="450" y2="330" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>
  <line x1="530" y1="230" x2="700" y2="330" stroke="#555" stroke-width="1.8" marker-end="url(#arr)"/>

  <text x="270" y="290" text-anchor="middle" font-size="9" fill="#888">deploys via</text>
  <text x="270" y="302" text-anchor="middle" font-size="9" fill="#888">CodePipeline</text>
  <text x="450" y="290" text-anchor="middle" font-size="9" fill="#888">deploys via</text>
  <text x="450" y="302" text-anchor="middle" font-size="9" fill="#888">CodePipeline</text>
  <text x="630" y="290" text-anchor="middle" font-size="9" fill="#888">deploys via</text>
  <text x="630" y="302" text-anchor="middle" font-size="9" fill="#888">CodePipeline</text>

  <!-- Dev Account -->
  <rect x="60" y="330" width="260" height="120" rx="12" fill="#27ae60" filter="url(#sh)"/>
  <text x="190" y="356" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Dev Account</text>
  <text x="190" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd700">222222222222</text>
  <text x="190" y="390" text-anchor="middle" font-size="10" fill="#d5f5e3">VPC 10.1.0.0/16</text>
  <text x="190" y="405" text-anchor="middle" font-size="10" fill="#d5f5e3">Lambda · API GW · S3</text>
  <text x="190" y="420" text-anchor="middle" font-size="10" fill="#d5f5e3">DevCrossAccountRole</text>
  <text x="190" y="435" text-anchor="middle" font-size="10" fill="#d5f5e3">GuardDuty</text>

  <!-- Staging Account -->
  <rect x="320" y="330" width="260" height="120" rx="12" fill="#f39c12" filter="url(#sh)"/>
  <text x="450" y="356" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Staging Account</text>
  <text x="450" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd700">333333333333</text>
  <text x="450" y="390" text-anchor="middle" font-size="10" fill="#fef9e7">VPC 10.2.0.0/16</text>
  <text x="450" y="405" text-anchor="middle" font-size="10" fill="#fef9e7">Lambda · API GW · S3</text>
  <text x="450" y="420" text-anchor="middle" font-size="10" fill="#fef9e7">StagingCrossAccountRole</text>
  <text x="450" y="435" text-anchor="middle" font-size="10" fill="#fef9e7">GuardDuty</text>

  <!-- Prod Account -->
  <rect x="580" y="330" width="260" height="120" rx="12" fill="#c0392b" filter="url(#sh)"/>
  <text x="710" y="356" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Production Account</text>
  <text x="710" y="373" text-anchor="middle" font-size="12" font-weight="bold" fill="#ffd700">444444444444</text>
  <text x="710" y="390" text-anchor="middle" font-size="10" fill="#fde8e8">VPC 10.3.0.0/16 (3 AZ)</text>
  <text x="710" y="405" text-anchor="middle" font-size="10" fill="#fde8e8">Lambda · API GW · S3</text>
  <text x="710" y="420" text-anchor="middle" font-size="10" fill="#fde8e8">ProdCrossAccountRole</text>
  <text x="710" y="435" text-anchor="middle" font-size="10" fill="#fde8e8">GuardDuty · CW Alarms</text>

  <!-- Promotion flow -->
  <rect x="60" y="490" width="780" height="44" rx="8" fill="#2c3e50"/>
  <text x="450" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#e67e22">Promotion Flow</text>
  <text x="190" y="526" text-anchor="middle" font-size="11" fill="white">Dev (Development)</text>
  <text x="340" y="526" text-anchor="middle" font-size="14" fill="#e67e22">→</text>
  <text x="450" y="526" text-anchor="middle" font-size="11" fill="white">Staging (Pre-Production)</text>
  <text x="560" y="526" text-anchor="middle" font-size="14" fill="#e67e22">→</text>
  <text x="710" y="526" text-anchor="middle" font-size="11" fill="white">Prod (Production Release)</text>

  <!-- Key point -->
  <rect x="60" y="546" width="780" height="32" rx="6" fill="#fff3cd" stroke="#f39c12" stroke-width="1"/>
  <text x="450" y="567" text-anchor="middle" font-size="10" fill="#856404">💡 Each account has its own VPC, IAM, S3, Lambda. Accounts communicate via IAM Roles and TGW for strong isolation.</text>

  <rect x="0" y="596" width="900" height="24" fill="#1a252f"/>
  <text x="450" y="612" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 1/10 — Account Structure</text>
</svg>
