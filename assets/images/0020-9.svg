<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
    <marker id="arr-g" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    <marker id="arr-r" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#c0392b"/></marker>
    <marker id="arr-o" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#e67e22"/></marker>
    <filter id="sh"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000028"/></filter>
  </defs>

  <rect width="1000" height="700" fill="#f5f7fa"/>
  <rect x="0" y="0" width="1000" height="48" fill="#1a252f"/>
  <text x="500" y="31" text-anchor="middle" font-size="18" font-weight="bold" fill="white">⑧ STS Temporary Credentials — Lifecycle &amp; Security Model</text>

  <!-- ══ TIMELINE ══ -->
  <rect x="30" y="58" width="940" height="80" rx="10" fill="white" stroke="#ccc" stroke-width="1" filter="url(#sh)"/>
  <text x="500" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Credential Lifetime Timeline (MaxSessionDuration = 4 hours in this project)</text>

  <!-- Timeline bar -->
  <rect x="60" y="88" width="880" height="20" rx="4" fill="#ecf0f1"/>
  <rect x="60" y="88" width="660" height="20" rx="4" fill="#27ae60"/>
  <rect x="720" y="88" width="220" height="20" rx="4" fill="#e74c3c"/>

  <text x="60"  y="84" font-size="9" fill="#555">T+0</text>
  <text x="370" y="84" font-size="9" fill="#27ae60">Valid — can access AWS resources</text>
  <text x="720" y="84" font-size="9" fill="#c0392b">Approaching expiry</text>
  <text x="940" y="84" font-size="9" fill="#555">T+4h</text>
  <text x="720" y="120" font-size="9" fill="#c0392b">↑ Expired — all requests rejected</text>

  <!-- ══ WHAT'S IN A TOKEN ══ -->
  <rect x="30" y="152" width="440" height="220" rx="12" fill="white" stroke="#8e44ad" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="152" width="440" height="28" rx="12" fill="#8e44ad"/>
  <text x="250" y="171" text-anchor="middle" font-size="12" font-weight="bold" fill="white">What STS Returns (3 pieces)</text>

  <rect x="50" y="190" width="400" height="54" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
  <text x="250" y="208" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">① AccessKeyId</text>
  <text x="250" y="224" text-anchor="middle" font-size="10" fill="#555">ASIAIOSFODNN7EXAMPLE</text>
  <text x="250" y="238" text-anchor="middle" font-size="9" fill="#888">Starts with "ASIA" (temporary) vs "AKIA" (permanent user)</text>

  <rect x="50" y="254" width="400" height="54" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
  <text x="250" y="272" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">② SecretAccessKey</text>
  <text x="250" y="288" text-anchor="middle" font-size="10" fill="#555">wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY</text>
  <text x="250" y="302" text-anchor="middle" font-size="9" fill="#888">Used to sign API requests (HMAC-SHA256)</text>

  <rect x="50" y="318" width="400" height="40" rx="8" fill="#f3e5f5" stroke="#8e44ad" stroke-width="1"/>
  <text x="250" y="336" text-anchor="middle" font-size="11" font-weight="bold" fill="#8e44ad">③ SessionToken</text>
  <text x="250" y="350" text-anchor="middle" font-size="9" fill="#888">Long opaque string — MUST be included in every request. Proves this is a temp credential.</text>

  <!-- ══ SECURITY PROPERTIES ══ -->
  <rect x="530" y="152" width="440" height="220" rx="12" fill="white" stroke="#27ae60" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="530" y="152" width="440" height="28" rx="12" fill="#27ae60"/>
  <text x="750" y="171" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Why Temporary Credentials Are Safer</text>

  <rect x="550" y="190" width="400" height="40" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="750" y="206" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">✓ Auto-expiry — leaked token becomes useless</text>
  <text x="750" y="220" text-anchor="middle" font-size="9" fill="#555">Attacker who steals token has max 4h window, then it's worthless</text>

  <rect x="550" y="238" width="400" height="40" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="750" y="254" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">✓ No storage needed — never written to disk</text>
  <text x="750" y="268" text-anchor="middle" font-size="9" fill="#555">Lambda SDK fetches from instance metadata endpoint automatically</text>

  <rect x="550" y="286" width="400" height="40" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="750" y="302" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">✓ Scoped to Role permissions only</text>
  <text x="750" y="316" text-anchor="middle" font-size="9" fill="#555">Token can only do what the Role's policy allows — nothing more</text>

  <rect x="550" y="334" width="400" height="28" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="750" y="348" text-anchor="middle" font-size="10" font-weight="bold" fill="#27ae60">✓ Full CloudTrail audit trail per session</text>
  <text x="750" y="360" text-anchor="middle" font-size="9" fill="#555">Every API call logged with RoleSessionName for traceability</text>

  <!-- ══ FULL FLOW ══ -->
  <rect x="30" y="386" width="940" height="270" rx="12" fill="white" stroke="#1a6faf" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="30" y="386" width="940" height="28" rx="12" fill="#1a6faf"/>
  <text x="500" y="405" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Complete STS Flow in This Project — Dev Lambda accessing Core S3</text>

  <!-- Step boxes -->
  <rect x="50" y="424" width="130" height="210" rx="8" fill="#27ae60"/>
  <text x="115" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="white">① Lambda starts</text>
  <text x="115" y="462" text-anchor="middle" font-size="9" fill="#d5f5e3">dev-app-fn invoked</text>
  <text x="115" y="478" text-anchor="middle" font-size="9" fill="#d5f5e3">by API Gateway</text>
  <text x="115" y="500" text-anchor="middle" font-size="9" fill="#a9dfbf">Code calls:</text>
  <rect x="62" y="508" width="106" height="56" rx="4" fill="#1e8449"/>
  <text x="115" y="522" text-anchor="middle" font-size="8" fill="#d5f5e3" font-family="monospace">sts.assume_role(</text>
  <text x="115" y="536" text-anchor="middle" font-size="8" fill="#d5f5e3" font-family="monospace">  RoleArn=</text>
  <text x="115" y="550" text-anchor="middle" font-size="8" fill="#d5f5e3" font-family="monospace">  CORE_ROLE_ARN,</text>
  <text x="115" y="564" text-anchor="middle" font-size="8" fill="#d5f5e3" font-family="monospace">  Session=</text>
  <text x="115" y="578" text-anchor="middle" font-size="8" fill="#d5f5e3" font-family="monospace">  "my-session"</text>
  <text x="115" y="596" text-anchor="middle" font-size="9" fill="#a9dfbf">)</text>
  <text x="115" y="614" text-anchor="middle" font-size="9" fill="#a9dfbf">Account: 222</text>

  <path d="M 180 529 L 210 529" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arr-o)"/>

  <rect x="210" y="424" width="130" height="210" rx="8" fill="#8e44ad"/>
  <text x="275" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="white">② STS validates</text>
  <text x="275" y="462" text-anchor="middle" font-size="9" fill="#e8d5f5">Checks Trust Policy</text>
  <text x="275" y="478" text-anchor="middle" font-size="9" fill="#e8d5f5">of CoreCrossAcct</text>
  <text x="275" y="494" text-anchor="middle" font-size="9" fill="#e8d5f5">Role:</text>
  <text x="275" y="512" text-anchor="middle" font-size="9" fill="#e8d5f5">"Is 222 trusted?"</text>
  <text x="275" y="530" text-anchor="middle" font-size="9" fill="#c39bd3">→ YES (in policy)</text>
  <text x="275" y="550" text-anchor="middle" font-size="9" fill="#e8d5f5">Issues 3-part</text>
  <text x="275" y="566" text-anchor="middle" font-size="9" fill="#e8d5f5">temp credential</text>
  <text x="275" y="582" text-anchor="middle" font-size="9" fill="#e8d5f5">TTL = 4 hours</text>
  <text x="275" y="614" text-anchor="middle" font-size="9" fill="#c39bd3">STS service</text>

  <path d="M 340 529 L 370 529" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arr-o)"/>

  <rect x="370" y="424" width="130" height="210" rx="8" fill="#f39c12"/>
  <text x="435" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="white">③ Lambda uses</text>
  <text x="435" y="462" text-anchor="middle" font-size="9" fill="#fef9e7">Creates new boto3</text>
  <text x="435" y="478" text-anchor="middle" font-size="9" fill="#fef9e7">S3 client with</text>
  <text x="435" y="494" text-anchor="middle" font-size="9" fill="#fef9e7">temp credentials:</text>
  <rect x="382" y="502" width="106" height="72" rx="4" fill="#d68910"/>
  <text x="435" y="516" text-anchor="middle" font-size="8" fill="#fef9e7" font-family="monospace">s3 = boto3.client(</text>
  <text x="435" y="530" text-anchor="middle" font-size="8" fill="#fef9e7" font-family="monospace">  's3',</text>
  <text x="435" y="544" text-anchor="middle" font-size="8" fill="#fef9e7" font-family="monospace">  aws_access_key_id</text>
  <text x="435" y="558" text-anchor="middle" font-size="8" fill="#fef9e7" font-family="monospace">  =creds['AKI'],</text>
  <text x="435" y="572" text-anchor="middle" font-size="8" fill="#fef9e7" font-family="monospace">  session_token</text>
  <text x="435" y="586" text-anchor="middle" font-size="8" fill="#fef9e7" font-family="monospace">  =creds['Token']</text>
  <text x="435" y="614" text-anchor="middle" font-size="9" fill="#fde8c8">Account: 111</text>

  <path d="M 500 529 L 530 529" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#arr-o)"/>

  <rect x="530" y="424" width="130" height="210" rx="8" fill="#1a6faf"/>
  <text x="595" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="white">④ S3 checks</text>
  <text x="595" y="462" text-anchor="middle" font-size="9" fill="#cce5ff">Receives request</text>
  <text x="595" y="478" text-anchor="middle" font-size="9" fill="#cce5ff">with SessionToken</text>
  <text x="595" y="496" text-anchor="middle" font-size="9" fill="#cce5ff">Verifies token</text>
  <text x="595" y="512" text-anchor="middle" font-size="9" fill="#cce5ff">with STS</text>
  <text x="595" y="530" text-anchor="middle" font-size="9" fill="#cce5ff">Checks Bucket</text>
  <text x="595" y="546" text-anchor="middle" font-size="9" fill="#cce5ff">Policy allows</text>
  <text x="595" y="562" text-anchor="middle" font-size="9" fill="#cce5ff">CoreCrossAcct</text>
  <text x="595" y="578" text-anchor="middle" font-size="9" fill="#cce5ff">Role</text>
  <text x="595" y="614" text-anchor="middle" font-size="9" fill="#aad4f5">core-shared bucket</text>

  <path d="M 660 529 L 690 529" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>

  <rect x="690" y="424" width="130" height="210" rx="8" fill="#1e8449"/>
  <text x="755" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="white">⑤ Access OK</text>
  <text x="755" y="462" text-anchor="middle" font-size="9" fill="#d5f5e3">Object returned</text>
  <text x="755" y="478" text-anchor="middle" font-size="9" fill="#d5f5e3">to Lambda</text>
  <text x="755" y="500" text-anchor="middle" font-size="9" fill="#a9dfbf">CloudTrail logs:</text>
  <text x="755" y="516" text-anchor="middle" font-size="9" fill="#a9dfbf">- Who: Role ARN</text>
  <text x="755" y="532" text-anchor="middle" font-size="9" fill="#a9dfbf">- What: GetObject</text>
  <text x="755" y="548" text-anchor="middle" font-size="9" fill="#a9dfbf">- When: timestamp</text>
  <text x="755" y="564" text-anchor="middle" font-size="9" fill="#a9dfbf">- Session name</text>
  <text x="755" y="614" text-anchor="middle" font-size="9" fill="#a9dfbf">Full audit trail ✓</text>

  <rect x="840" y="424" width="110" height="210" rx="8" fill="#2c3e50"/>
  <text x="895" y="444" text-anchor="middle" font-size="10" font-weight="bold" fill="#e67e22">After 4h</text>
  <text x="895" y="462" text-anchor="middle" font-size="9" fill="#aaa">Token expires</text>
  <text x="895" y="480" text-anchor="middle" font-size="9" fill="#aaa">automatically</text>
  <text x="895" y="500" text-anchor="middle" font-size="9" fill="#aaa">Next Lambda</text>
  <text x="895" y="516" text-anchor="middle" font-size="9" fill="#aaa">invocation</text>
  <text x="895" y="532" text-anchor="middle" font-size="9" fill="#aaa">calls STS again</text>
  <text x="895" y="550" text-anchor="middle" font-size="9" fill="#aaa">for fresh token</text>
  <text x="895" y="570" text-anchor="middle" font-size="9" fill="#27ae60">Zero manual</text>
  <text x="895" y="586" text-anchor="middle" font-size="9" fill="#27ae60">rotation needed</text>
  <text x="895" y="614" text-anchor="middle" font-size="9" fill="#27ae60">✓ Automatic</text>

  <rect x="0" y="678" width="1000" height="22" fill="#1a252f"/>
  <text x="500" y="694" text-anchor="middle" font-size="10" fill="#7f8c8d">Diagram 8/10 — STS Temporary Credentials Lifecycle</text>
</svg>
