<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">

  <style>
    /* ---------- 全局 ---------- */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f9fc;
      color: #1a1a1a;
      margin: 0;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ---------- 顶部导航 ---------- */
    .top-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      font-size: 14px;
      color: #666;
    }

    .nav-left a {
      margin-right: 20px;
      color: #666;
    }

    .nav-left a:hover {
      color: #007cf0;
    }

    /* ---------- 主体布局 ---------- */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 10px 20px 60px;
    }

    /* ---------- 标题区域 ---------- */
    .post-header {
      margin-top: 20px;
      margin-bottom: 40px;
    }

    .post-title {
      font-size: 34px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .post-meta {
      font-size: 13px;
      color: #888;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ---------- TAG ---------- */
    .tags {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 12px;
      padding: 4px 10px;
      background: #eef3ff;
      border-radius: 999px;
      color: #3366ff;
    }

    /* ---------- 正文 ---------- */
    .content {
      font-size: 16px;
      line-height: 1.8;
    }

    .content h2 {
      margin-top: 40px;
      font-size: 22px;
    }

    .content h3 {
      margin-top: 30px;
      font-size: 18px;
    }

    .content p {
      margin: 14px 0;
    }

    /* ---------- 图片 ---------- */
    .content img {
      width: 100%;
      border-radius: 10px;
      margin: 20px 0;
    }

    /* ---------- 代码块（重点优化） ---------- */
    pre {
      background: #0f172a;
      color: #e2e8f0;
      padding: 18px;
      border-radius: 10px;
      overflow-x: auto;
      position: relative;
      font-size: 14px;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #1e293b;
      border: none;
      color: #fff;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    /* ---------- 表格 ---------- */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 10px;
      text-align: left;
    }

    th {
      color: #666;
    }

    /* ---------- 底部 ---------- */
    .post-footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      color: #777;
    }

    .post-footer a {
      margin-left: 15px;
      color: #007cf0;
    }

    /* ---------- 移动端 ---------- */
    @media (max-width: 768px) {
      .top-nav {
        padding: 15px 20px;
      }

      .post-title {
        font-size: 26px;
      }

      .container {
        padding: 10px 16px 40px;
      }

      .post-footer {
        flex-direction: column;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- 顶部导航 -->
  <div class="top-nav">
    <div class="nav-left">
      <a href="{{ '/' | relative_url }}">🏠 Home</a>
      <a href="{{ '/all-articles/' | relative_url }}">📝 Articles</a>
    </div>
  </div>

  <div class="container">

    <!-- 标题区域 -->
    <div class="post-header">
      <div class="post-title">{{ page.title }}</div>

      <div class="post-meta">
        <span>{{ page.date | date: "%Y-%m-%d" }}</span>
        <span>·</span>
        <span>{{ page.author }}</span>
      </div>

      <!-- TAG -->
      {% if page.tags %}
      <div class="tags">
        {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>

    <!-- 正文 -->
    <div class="content">
      {{ content }}
    </div>

    <!-- 底部 -->
    <div class="post-footer">
      <div>© {{ page.author }}</div>
      <div>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/all-articles/' | relative_url }}">All</a>
      </div>
    </div>

  </div>

</body>

<script>
document.addEventListener("DOMContentLoaded", function() {
  document.querySelectorAll("pre").forEach(function(block) {
    const button = document.createElement("button");
    button.innerText = "Copy";
    button.className = "copy-btn";

    button.onclick = () => {
      navigator.clipboard.writeText(block.innerText)
        .then(() => {
          button.innerText = "Copied!";
          setTimeout(() => button.innerText = "Copy", 1000);
        });
    };

    block.appendChild(button);
  });
});
</script>

</html>
